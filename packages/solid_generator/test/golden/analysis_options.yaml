# Analysis config for the paired golden fixtures.
#
# Inputs are test source files that intentionally violate user-facing rules
# Solid expects (SPEC Section 2: a `StatelessWidget` with a mutable
# `@SolidState` field trips `must_be_immutable`) and import runtime packages
# (flutter, flutter_solidart) that the generator package itself does not
# depend on. Both are suppressed here.
#
# Outputs are byte-comparison fixtures for builder output, not shippable lib
# code. Per SPEC Section 9 the generator does NOT prune unused imports or
# const-ify constructors — both are `dart fix --apply`'s job at the
# consumer-app level. The fixtures therefore appear pre-`dart fix` and would
# trip several lints (`unused_import`, `prefer_const_constructors_in_immutables`).
# Rather than suppress each lint individually we exclude outputs/ from
# analysis altogether.
include: package:very_good_analysis/analysis_options.yaml
analyzer:
  exclude:
    - outputs/**
  errors:
    must_be_immutable: ignore
    depend_on_referenced_packages: ignore
    directives_ordering: ignore
    always_put_required_named_parameters_first: ignore
    invalid_annotation_target: ignore
    lines_longer_than_80_chars: ignore
