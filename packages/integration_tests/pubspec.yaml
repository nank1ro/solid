name: integration_tests
description: Runtime widget-contract tests for code emitted by solid_generator.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_solidart: ^3.0.0-dev.1
  provider: ^6.1.5
  solid_annotations:
    path: ../solid_annotations

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  solid_generator:
    path: ../solid_generator
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
