version: 0.0.1

environment:
  sdk: ^3.9.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_solidart: ^2.7.3
  provider: ^6.1.0
  solid_annotations:
    path: ../solid_annotations

dev_dependencies:
  build_runner: ^2.14.0
  flutter_test:
    sdk: flutter
  solid_generator:
    path: ../solid_generator
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
