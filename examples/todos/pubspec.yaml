version: 0.0.1

environment:
  sdk: ^3.9.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_solidart: ^2.7.3
  provider: ^6.1.0
  solid_annotations:
    path: ../../packages/solid_annotations
