include: package:very_good_analysis/analysis_options.yaml
analyzer:
  errors:
    must_be_immutable: ignore
    # `const Page({super.key})` with an `@SolidEnvironment() late Foo field;`
    # is structurally non-const in source — but the generator splits the
    # widget class so the field lives on State, making the lowered Widget
    # const-eligible. Suppress both the declaration-side and the call-site
    # error so source LSP doesn't flood while keeping const ctors for the
    # runtime const optimization.
    const_constructor_with_non_final_field: ignore
    const_with_non_const: ignore
    # File-level `// ignore_for_file:` directives in source/ describe
    # source-side type mismatches that don't fire in the lowered lib/ —
    # the lib analyzer would otherwise flag those directives as
    # unnecessary. Suppress to keep source/ and lib/ ignores symmetric.
    unnecessary_ignore: ignore
    always_put_required_named_parameters_first: ignore
    invalid_annotation_target: ignore
    avoid_print: ignore
    unnecessary_statements: ignore
    # Generated `lib/` interpolated tab labels like
    # `'incomplete (${todosController.incompleteTodos.value.length})'`
    # exceed 80 chars after `dart format` chooses a single-line wrap.
    # The text is intentionally not split (interpolation contents are not
    # line-breakable); suppress at the example level.
    lines_longer_than_80_chars: ignore
    # Generated env-injection fields are `late final foo =
    # context.read<Foo>();` (no explicit type). The Dart analyzer infers
    # `Foo` from the generic call but `very_good_analysis` treats this as
    # non-obvious. The type IS clear from the receiver; suppress here.
    specify_nonobvious_property_types: ignore
linter:
  rules:
    public_member_api_docs: false
    # Source files must use relative imports for same-package siblings; the
    # generator mirrors paths 1:1 into `lib/`, so the same rule must hold
    # there. Turn off `very_good_analysis`'s default `always_use_package_imports`
    # and enable its opposite as a tripwire for any future generator
    # regression that leaks `package:<self>/...` into `lib/`.
    always_use_package_imports: false
    prefer_relative_imports: true
