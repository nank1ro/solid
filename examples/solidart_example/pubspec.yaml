name: solidart_example
description: A Solidart showcase example app demonstrating Solid v2.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_solidart: ^3.0.0-dev.1
  http: ^1.6.0
  provider: ^6.1.5
  solid_annotations:
    path: ../../packages/solid_annotations

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  solid_generator:
    path: ../../packages/solid_generator
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
